services:
  seiki-crm:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    image: seiki-crm:latest
    restart: unless-stopped

    ports:
      # Bound to 127.0.0.1 only: this container is never meant to be
      # reachable directly from outside the machine it runs on. A
      # reverse proxy (system Nginx, Traefik, Caddy, ...) sits in front,
      # terminates the real domain/TLS, and forwards to this loopback
      # port. Change HOST_PORT if that port is already taken.
      - "127.0.0.1:${HOST_PORT:-8080}:8080"

    # ---- Hardening ----
    # The image runs as a non-root user already (see Dockerfile), this
    # goes further: the container filesystem itself is read-only, all
    # Linux capabilities are dropped, and privilege escalation is
    # disabled. Only the two directories Nginx actually needs to write
    # to (its pid/temp files and its cache) get a small in-memory tmpfs.
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Resource ceiling so a runaway process/traffic spike can't take
    # down the rest of the host. Generous for a static file server —
    # tune to the host's actual capacity.
    mem_limit: 128m
    cpus: 1.0
    pids_limit: 100

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
