# Served by nginxinc/nginx-unprivileged — runs as a non-root user on
# port 8080. No server_name/domain here on purpose: the host that runs
# this container owns the domain and TLS certificate, via their own
# reverse proxy (Traefik, Caddy, their own Nginx, a PaaS load balancer,
# Cloudflare, ...). This container only needs to answer plain HTTP.

server {
    listen       8080;
    listen       [::]:8080;

    # Don't advertise the exact Nginx version to clients/attackers.
    server_tokens off;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ---- Security headers (also repeated in any location below that
    # sets its own add_header — Nginx only inherits parent add_header
    # directives into a location that defines none of its own) ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # style-src needs 'unsafe-inline' because the app renders many React
    # inline style objects as style="..." attributes. connect-src allows
    # any *.supabase.co host since the actual project URL is only known
    # at image-build time (VITE_SUPABASE_URL) — narrow this to your exact
    # Supabase project domain if you want a tighter policy.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    # ---- SPA routing: any path that isn't a real file (e.g. /leads/42)
    # falls back to index.html so client-side routing can handle it ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, otherwise browsers keep serving a
    # page that references old (deleted) hashed asset filenames after a
    # new deploy.
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; form-action 'self'" always;
    }

    # Vite hashes every filename under /assets/ (e.g. index-Czi8ebG3.js),
    # so it's safe to cache these forever — a new build always produces
    # new filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location ~* \.(?:woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Never serve dotfiles (.env, .git, ...) if one ever ends up in the
    # image by mistake.
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
