# System Nginx config for the VM — this is NOT the Nginx inside the
# container (that one is docker/nginx.conf, and only ever talks HTTP on
# 127.0.0.1:8080). This is the public-facing reverse proxy: it owns the
# domain, and forwards everything to the container running on the same
# machine.
server {
    listen 80;
    listen [::]:80;

    server_name seikicrm.h.minet.net;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }
}

# Once you point a real DNS record at this VM, add HTTPS with:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d seikicrm.h.minet.net
# Certbot edits this file in place to add the certificate and a
# listen 443 ssl block — no changes needed here beforehand.
